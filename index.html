<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <meta charset="utf-8" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <h1>ROCK PAPER SCISSORS</h1>

    <div class="containerIcons">
      <img src="img/rock.svg" alt="Rock" class="buttonRock" />
      <img src="img/paper.svg" alt="Paper" class="buttonPaper" />
      <img src="img/scissors.svg" alt="Scissors" class="buttonScissors" />
    </div>

    <div class="containerScore">
      <div class="playerScore">
        PLAYER
        <div class="playerScoreBoard"></div>
      </div>
      <div class="computerScore">
        COMPUTER
        <div class="computerScoreBoard"></div>
      </div>
    </div>

    <div class="containerResults">
      <div class="playerSelection"></div>
      <div class="computerSelection"></div>
    </div>

    <div class="containerAnnounceResult"></div>

    <div class="containerPlayAgain">
      <button class="buttonPlayAgain">PLAY AGAIN</button>
    </div>
  </body>
</html>
